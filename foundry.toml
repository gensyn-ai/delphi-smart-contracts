[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
evm_version = "prague"
show_progress = true
fs_permissions = [
  { access = "read", path = "script/input/" },
  { access = "read", path = "config/" }
]

# Optimizer settings
viaIR = false
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 10_000
show_logs = false

[invariant]
runs = 25
depth = 1000
fail_on_revert = true
show_metrics = true
shrink_run_limit=200
corpus_dir = "corpus/invariants"

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
gensyn-testnet = "https://gensyn-testnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
gensyn-mainnet = "https://gensyn-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
ethereum-mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
